<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .bg { fill: #f5f5f5; }
    .header { fill: url(#grad); }
    .card { fill: white; stroke: #e0e0e0; stroke-width: 1; rx: 6; ry: 6; }
    .btn-primary { fill: #667eea; rx: 6; ry: 6; }
    .btn-secondary { fill: #e0e0e0; rx: 6; ry: 6; }
    .btn-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: white; }
    .btn-text-sec { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: #333; }
    .dot { fill: #4caf50; }
    .dot-off { fill: #f44336; }
    .text-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 20px; font-weight: 600; fill: white; }
    .text-sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: rgba(255,255,255,0.9); }
    .text-h2 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
    .text-body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #555; }
    .text-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 500; fill: #666; }
    .text-muted { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #999; }
    .input { fill: white; stroke: #ddd; stroke-width: 1; rx: 4; ry: 4; }
    .log-bg { fill: #f9f9f9; stroke: #e0e0e0; stroke-width: 1; rx: 4; ry: 4; }
    .log-entry { font-family: 'Monaco', 'Menlo', monospace; font-size: 9px; fill: #333; }
    .log-time { fill: #999; }
    .log-success { fill: #4caf50; }
    .log-info { fill: #2196f3; }
    .divider { stroke: #e0e0e0; stroke-width: 1; }
  </style>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" class="bg"/>

  <!-- Header -->
  <rect x="0" y="0" width="400" height="70" class="header" rx="0" ry="0"/>
  <text x="200" y="32" text-anchor="middle" class="text-title">🦞 OpenClaw</text>
  <text x="200" y="50" text-anchor="middle" class="text-sub">Browser Control</text>

  <!-- Status Card -->
  <rect x="16" y="86" width="368" height="56" class="card"/>
  <circle cx="32" cy="114" r="6" class="dot"/>
  <text x="48" y="118" class="text-body" style="font-weight:500;">Connected</text>
  <text x="48" y="132" class="text-muted" style="font-size:10px;">ws://localhost:8765</text>
  <rect x="280" y="96" width="80" height="32" class="card" style="stroke:#4caf50; stroke-width:1;"/>
  <text x="320" y="118" text-anchor="middle" class="text-body" style="font-size:11px; fill:#4caf50;">🟢 Live</text>

  <!-- Connection Info -->
  <rect x="16" y="154" width="368" height="56" class="card"/>
  <text x="32" y="180" class="text-label">Server:</text>
  <text x="120" y="180" class="text-body">localhost</text>
  <text x="32" y="200" class="text-label">Port:</text>
  <text x="120" y="200" class="text-body">8765</text>

  <!-- Controls -->
  <rect x="16" y="222" width="368" height="56" class="card"/>
  <rect x="32" y="234" width="156" height="32" class="btn-primary"/>
  <text x="110" y="253" text-anchor="middle" class="btn-text">Connect</text>
  <rect x="196" y="234" width="156" height="32" class="btn-secondary" opacity="0.5"/>
  <text x="274" y="253" text-anchor="middle" class="btn-text-sec" opacity="0.5">Disconnect</text>

  <!-- Settings -->
  <rect x="16" y="290" width="368" height="140" class="card"/>
  <text x="32" y="316" class="text-h2">Settings</text>

  <text x="32" y="342" class="text-label">WebSocket Host:</text>
  <rect x="32" y="348" width="336" height="28" class="input"/>
  <text x="40" y="368" class="text-body" style="font-size:12px;">localhost</text>

  <text x="32" y="386" class="text-label">WebSocket Port:</text>
  <rect x="32" y="392" width="336" height="28" class="input"/>
  <text x="40" y="412" class="text-body" style="font-size:12px;">8765</text>

  <rect x="32" y="418" width="20" height="20" class="card" style="stroke:#667eea;"/>
  <text x="58" y="432" class="text-body" style="font-size:11px;">Auto-connect on startup</text>

  <rect x="200" y="418" width="20" height="20" class="card" style="stroke:#667eea;"/>
  <text x="226" y="432" class="text-body" style="font-size:11px;">Auto-reconnect on disconnect</text>

  <rect x="32" y="430" width="156" height="30" class="btn-primary"/>
  <text x="110" y="448" text-anchor="middle" class="btn-text" style="font-size:12px;">Save Settings</rect>

  <!-- Activity Log -->
  <rect x="16" y="442" width="368" height="48" class="card" style="height:auto;"/>
  <text x="32" y="462" class="text-h2">Activity Log</text>

  <rect x="32" y="468" width="336" height="80" class="log-bg"/>
  <text x="40" y="485" class="log-entry"><tspan class="log-time">17:42:13</tspan> <tspan class="log-success">✓</tspan> Connected to OpenClaw server</text>
  <text x="40" y="500" class="log-entry"><tspan class="log-time">17:42:15</tspan> <tspan class="log-info">ℹ</tspan> Command: navigate → example.com</text>
  <text x="40" y="515" class="log-entry"><tspan class="log-time">17:42:18</tspan> <tspan class="log-success">✓</tspan> Result: {loaded: true, url: "..."}</text>

  <rect x="32" y="520" width="80" height="22" class="card" style="stroke:#ddd;"/>
  <text x="72" y="534" text-anchor="middle" class="text-muted" style="font-size:10px;">Clear Logs</text>

  <!-- Version -->
  <text x="200" y="560" text-anchor="middle" class="text-muted" style="font-size:10px;">Version 1.0.0</text>
</svg>