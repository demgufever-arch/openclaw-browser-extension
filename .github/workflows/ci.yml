name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install -g eslint
      - run: |
          npx eslint background/ content/ popup/ utils/ --ext .js || true
          # No ESLint config yet, so this will just check basic syntax

  package:
    name: Package Extension
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Create extension zip
        run: |
          cd openclaw-browser-extension
          zip -r ../openclaw-extension.zip . -x "*.git*" "*.md" "*.log" "docs/*" ".github/*" "LICENSE"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-extension
          path: openclaw-extension.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: openclaw-extension
      - uses: softprops/action-gh-release@v2
        with:
          files: openclaw-extension.zip
          generate_release_notes: true